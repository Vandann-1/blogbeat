  <!-- Header Section -->
  {% load static %}

  <!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Ultra Pro Header</title>
      <style>
          :root {
              --primary: #0a0a0a;
              --accent: #161d1d;
              --text: #130404;
              --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
          }
  
          * {
              margin: 0;
              padding: 0;
              box-sizing: border-box;
              font-family: 'Segoe UI', system-ui, sans-serif;
          }
  
          .ultra-header {
              background: rgba(127, 208, 255, 0.95);
              backdrop-filter: blur(12px);
              padding: 1rem 5%;
              position: fixed;
              top: 0;
              left: 0;
              right: 0;
              z-index: 1000;
              border-bottom: 1px solid rgba(255, 255, 255, 0.291);
              box-shadow: 0 8px 32px rgba(116, 87, 87, 0.15);
          }
  
          .nav-container {
              display: flex;
              justify-content: space-between;
              align-items: center;
              max-width: 1440px;
              margin: 0 auto;
          }
  
          .logo {
              color: var(--text);
              font-size: 1.75rem;
              font-weight: 700;
              text-decoration: none;
              background: linear-gradient(45deg, var(--accent), #090c11);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
              transition: var(--transition);
          }
  
          .nav-links {
              display: flex;
              align-items: center;
              gap: 2rem;
          }
  
          .nav-link {
              color: var(--text);
              text-decoration: none;
              font-weight: 600;
              position: relative;
              padding: 0.5rem 0;
              transition: var(--transition);
          }
  
          .nav-link::after {
              content: '';
              position: absolute;
              bottom: 0;
              left: 9px;
              width: 0;
              height: 2px;
              background: var(--accent);
              transition: var(--transition);
          }
  
          .nav-link:hover::after {
              width: 100%;
          }
  
          .profile-icon {
              width: 40px;
              height: 40px;
              border-radius: 50%;
              overflow: hidden;
              cursor: pointer;
              border: 2px solid var(--accent);
              transition: var(--transition);
          }
  
          .profile-icon:hover {
              transform: scale(1.1);
          }
  
          .profile-icon img {
              width: 100%;
              height: 100%;
              object-fit: cover;
          }
  
          @media (max-width: 768px) {
              .nav-links {
                  display: none;
              }
          }
      </style>
  </head>
  <body>
      <header class="ultra-header">
          <nav class="nav-container">
              <a href="#" class="logo">BlogBeat</a>
              <div class="nav-links">
                  {% if user.is_authenticated %}
                      <a href="add-blog" class="nav-link">Add Blogs</a>
                      <a href="/" class="nav-link">All Blogs</a>
                      <a href="my-blog" class="nav-link">My Blogs</a>
                      <a href="accounts/logout" class="nav-link">Logout</a>
                      <a href="profile" class="profile-icon">
                          <img src="{% static 'images/profile-icon.png' %}" alt="Profile">
                        profile</a>
                  {% else %}
                      <a href="/" class="nav-link">Signup</a>
                      <a href="accounts/login" class="nav-link">Login</a>
                  {% endif %}
              </div>
          </nav>
      </header>
  </body>
  </html>
