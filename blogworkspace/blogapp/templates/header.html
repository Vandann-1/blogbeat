{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlogBeat - Profile</title>
    <style>
        :root {
            --primary: #0a0a0a;
            --accent: #161d1d;
            --text: #130404;
            --transition: all 0.3s ease-in-out;
            --bg-light: white;
            --bg-dark: #090c11;
            --text-light: #130404;
            --text-dark: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: var(--bg-light);
            color: var(--text-light);
            transition: var(--transition);
        }

        .ultra-header {
            background: rgba(127, 208, 255, 0.95);
            padding: 1rem 5%;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 1.75rem;
            font-weight: 700;
            text-decoration: none;
            color: var(--text);
            transition: var(--transition);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .profile-section {
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .profile-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--text);
        }

        .profile-dropdown {
            position: absolute;
            top: 50px;
            right: 0;
            background: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            display: none;
            flex-direction: column;
            min-width: 200px;
            padding: 10px;
        }

        .profile-dropdown a {
            padding: 10px;
            text-decoration: none;
            color: var(--text);
            display: block;
            transition: var(--transition);
        }

        .profile-dropdown a:hover {
            background: #f0f0f0;
        }

        .profile-section.active .profile-dropdown {
            display: flex;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .nav-links.active {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <header class="ultra-header">
        <a href="#" class="logo">BlogBeat</a>
        <nav class="nav-links">
            {% if user.is_authenticated %}
                <a href="add-blog" class="nav-link">Add Blogs</a>
                <a href="/" class="nav-link">All Blogs</a>
                <a href="my-blog" class="nav-link">My Blogs</a>
                <div class="profile-section" onclick="toggleProfileMenu()">
                    <img src="{% static 'images/profile.jpg' %}" alt="Profile" class="profile-img">
                    <div class="profile-dropdown">
                        <p><strong>{{ user.username }}</strong></p>
                        <p>{{ user.email }}</p>
                        <hr>
                        <a href="profile">View Profile</a>
                        <a href="settings">Settings</a>
                        <a href="my-blog">My Blogs</a>
                        <a href="saved">My Saved</a>
                        <a href="edit-profile">Edit Profile</a>
                        <a href="help-support">Help & Support</a>
                        <a  href="accounts/logout">Logout</a>
                    </div>
                </div>
            {% else %}
                <a href="/" class="nav-link">Signup</a>
                <a href="{% url 'login' %}" class="nav-link">Login</a>
            {% endif %}
        </nav>
    </header>

    <script>
        function toggleProfileMenu() {
            document.querySelector('.profile-section').classList.toggle('active');
        }
    </script>
</body>
</html>
