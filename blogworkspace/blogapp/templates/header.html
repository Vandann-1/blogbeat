{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlogBeat - Profile</title>
    <style>
        :root {
            --primary: #0a0a0a;
            --accent: #161d1d;
            --text: #130404;
            --transition: all 0.3s ease-in-out;
            --bg-light: white;
            --bg-dark: #090c11;
            --text-light: #130404;
            --text-dark: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: var(--bg-light);
            color: var(--text-light);
            transition: var(--transition);
        }

        .ultra-header {
            background: rgba(127, 208, 255, 0.95);
            padding: 1rem 5%;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 1.75rem;
            font-weight: 700;
            text-decoration: none;
            color: var(--text);
            transition: var(--transition);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            font-size: large;
            font-weight: bold;
        }
/* Profile Section Styling */
.profile-section {
    position: relative;
    cursor: pointer;
    display: flex;
    align-items: center;
}

/* Ensure no unwanted dots appear */
.profile-section::before,
.profile-section::after {
    content: "" !important;  /* Removes any generated dots */
    display: none !important;
}

/* Fix extra dots caused by list styles */
.profile-section ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

/* Fix dots appearing inside */
.profile-section li::before,
.profile-section li::after {
    content: "" !important;
    display: none !important;
}

/* Remove any potential list marker dots */
.profile-section li::marker {
    display: none !important;
}


        .profile-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--text);
        }

        .profile-dropdown {
            position: absolute;
            top: 50px;
            right: 0;
            background: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            display: none;
            flex-direction: column;
            min-width: 200px;
            padding: 10px;
        }

        .profile-dropdown a {
            padding: 10px;
            text-decoration: none;
            color: var(--text);
            display: block;
            transition: var(--transition);
        }

        .profile-dropdown a:hover {
            background: #f0f0f0;
        }

        .profile-section.active .profile-dropdown {
            display: flex;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .nav-links.active {
                display: flex;
            }
        }
        @media (max-width: 768px) {
            body {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <header class="ultra-header">
        <a href="#" class="logo">BlogBeat</a>
        <nav class="nav-links">
            {% if user.is_authenticated %}
                <a href="add-blog" class="nav-link">Add Blogs</a>
                <a href="/" class="nav-link">All Blogs</a>

                <div class="profile-section" onclick="toggleProfileMenu()">
                    <img src= "{% static 'img/th.jpg' %}"alt="Profile" class="profile-img">
                    <div class="profile-dropdown">
                        <p><strong>{{ user.username }}</strong></p>
                        <p>{{ user.email }}</p>
        
                
                        <ul>
                            <li><a href="my-blog"><i class="fas fa-user"></i> My Blog </a></li>
                            <li><a href="settings"><i class="fas fa-cog"></i> Settings</a></li>
                            <li><a href="#"><i class="fas fa-credit-card"></i> saved Blog</a></li>
                            <li><a href="logout"><i class="fas fa-sign-out"></i> logout</a></li>
                        <ul>
        
    
                    </div>
                </div>
            {% else %}
                <a href="/" class="nav-link">Signup</a>
                <a href="{% url 'login' %}" class="nav-link">Login</a>
            {% endif %}
        </nav>
    </header>

    <script>
        function toggleProfileMenu() {
            document.querySelector('.profile-section').classList.toggle('active');
        }
    </script>
</body>
</html>
