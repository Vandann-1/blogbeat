{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlogBeat - Profile</title>
    <style>
        :root {
            --primary: #0077b6;
            --accent: #00b4d8;
            --text: #ffffff;
            --bg-light: #f8f9fa;
            --bg-dark: #03045e;
            --transition: all 0.3s ease-in-out;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: var(--bg-light);
            color: var(--text-dark);
            transition: var(--transition);
        }

        .header {
            background: var(--bg-dark);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            text-decoration: none;
            color: var(--text);
            transition: var(--transition);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text);
            font-size: 1rem;
            font-weight: bold;
            transition: var(--transition);
            padding: 0.5rem 1rem;
            border-radius: 5px;
        }

        .nav-link:hover {
            background: var(--accent);
        }

        .profile-section {
            position: relative;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .profile-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--text);
        }

        .profile-dropdown {
            position: absolute;
            top: 60px;
            right: 0;
            background: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            display: none;
            flex-direction: column;
            min-width: 200px;
            padding: 10px;
        }

        .profile-dropdown a {
            padding: 10px;
            text-decoration: none;
            color: black;
            display: block;
            transition: var(--transition);
        }

        .profile-dropdown a:hover {
            background: #f0f0f0;
        }

        .profile-section.active .profile-dropdown {
            display: flex;
        }

        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            color: var(--text);
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 60px;
                right: 5%;
                background: var(--bg-dark);
                padding: 1rem;
                border-radius: 10px;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            }

            .nav-links.active {
                display: flex;
            }

            .menu-toggle {
                display: block;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="#" class="logo">BlogBeat</a>
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
        <nav class="nav-links">
            {% if user.is_authenticated %}
                <a href="add-blog" class="nav-link">Add Blogs</a>
                <a href="/" class="nav-link">All Blogs</a>

                <div class="profile-section" onclick="toggleProfileMenu()">
                    <img src="{% static 'img/th.jpg' %}" alt="Profile" class="profile-img">
                    <div class="profile-dropdown">
                        <p><strong>{{ user.username }}</strong></p>
                        <p>{{ user.email }}</p>
                        <a href="my-blog">My Blog</a>
                        <a href="settings">Settings</a>
                        <a href="#">Saved Blogs</a>
                        <a href="logout">Logout</a>
                    </div>
                </div>
            {% else %}
                <a href="/" class="nav-link">Signup</a>
                <a href="{% url 'login' %}" class="nav-link">Login</a>
            {% endif %}
        </nav>
    </header>

    <script>
        function toggleProfileMenu() {
            document.querySelector('.profile-section').classList.toggle('active');
        }

        function toggleMenu() {
            document.querySelector('.nav-links').classList.toggle('active');
        }
    </script>
</body>
</html>
