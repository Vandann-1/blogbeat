<!-- edit_blog.html -->

<h1>Edit Blog</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div>
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" value="{{ blog.title }}">
    </div>
    <div>
        <label for="description">Description:</label>
        <textarea id="description" name="description">{{ blog.description }}</textarea>
    </div>
    <div>
        <label for="blog_image">Blog Image:</label>
        <input type="file" id="blog_image" name="blog_image">
        <img src="{{ blog.blog_image.url }}" alt="Current Blog Image">
    </div>
    <button type="submit">Save Changes</button>
    <a href="{% url 'myblog' %}">Cancel</a>
</form>
