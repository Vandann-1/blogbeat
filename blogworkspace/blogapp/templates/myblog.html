{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blogs - BlogBeat</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* Page Background */
        body {
            background:white;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container */
        .container {
            width: 90%;
            max-width: 1000px;
            background: rgba(47, 144, 247, 0.989);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        /* Heading */
        h1 {
            font-size: 26px;
            margin-bottom: 20px;
            color: #010c17;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(19, 1, 1, 0.85);
        }

        thead {
            background: rgba(0, 102, 255, 0.7);
            color: white;
        }

        th {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid rgba(23, 1, 1, 0.2);
        }
        th,td{
            color: #010c17;
        
            padding: 15px;
        }

        tbody tr {
            background: rgba(255, 255, 255, 0.908);
            transition: 0.3s;
        }

        /* Blog Image */
        .blog-image {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.951);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .action-buttons a {
            text-decoration: none;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 14px;
            transition: 0.3s;
        }

        .delete-btn {
            background: #000000;
        }

        .delete-btn:hover {
            background:rgba(0, 102, 255, 0.7);
            box-shadow: 0 0 10px rgba(0, 149, 236, 0.809);
        }

        .edit-btn {
            background: #000000;
        }

        .edit-btn:hover {
            background: rgba(0, 102, 255, 0.7);

            box-shadow: 0 0 10px rgba(0, 149, 236, 0.809);
        }

        .repeat-btn {
            background: #000000
        }

        .repeat-btn:hover {
            background:rgba(0, 102, 255, 0.7);
            box-shadow:  0 0 10px rgba(0, 149, 236, 0.809);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>My Blogs</h1>

        <table border="1">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Image</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for blog in blogs %}
                <tr>
                    <td>{{ blog.title }}</td>
                    <td>{{ blog.description }}</td>
                    <td>
                        <img src="{{ blog.blog_image.url }}" alt="Blog Image" class="blog-image">
                    </td>
                    <td>
                        <div class="action-buttons">
                            <a href="{% url 'delete_blog' bg_id=blog.id %}" class="delete-btn">delete</a>
                            <a href="{% url 'edit_blog' bg_id=blog.id %}" class="edit-btn">Edit</a>
                            <a href="{% url 're' blog_id=blog.id %}" class="repeat-btn">Repeat</a>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
