{% load static %}
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

.settings-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    padding: 2rem;
}

.settings-box {
    background: white;
    padding: 2.5rem;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    max-width: 600px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.settings-box h2 {
    font-size: 28px;
    color: #333;
    margin-bottom: 1rem;
    text-align: center;
}

.settings-menu {
    display: flex;
    flex-direction: column;
    width: 100%;
    gap: 15px;
}

.settings-menu a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px;
    background: #0072ff;
    color: white;
    font-size: 16px;
    border-radius: 8px;
    text-decoration: none;
    transition: 0.3s;
}

.settings-menu a:hover {
    background: #005bb5;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0, 114, 255, 0.3);
}

.settings-menu a i {
    font-size: 20px;
}

/* Responsive Design */
@media (max-width: 768px) {
    .settings-box {
        padding: 2rem;
    }
}
</style>

<div class="settings-container">
    <div class="settings-box">
        <h2>Settings</h2>
        <div class="settings-menu">
            <a href=#>
                Account Settings <i class="fas fa-user-cog"></i>
            </a>
            <a href=#>
                Personalization <i class="fas fa-palette"></i>
            </a>
            <a href=#>
                Notification & Alerts <i class="fas fa-bell"></i>
            </a>
            <a href="{% url 'helpspt' %}">
                Help & Support <i class="fas fa-question-circle"></i>
            </a>
        </div>
    </div>
</div>

<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
