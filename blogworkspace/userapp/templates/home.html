{% extends 'custom.html' %}

{% block content %}
<br> <br> <br>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: linear-gradient(to right, #f8f9fa, #e3f2fd);
    color: #333;
    background-attachment: fixed; /* Fixed background for parallax effect */
  }
  
  .search-container {
    display: flex;
    justify-content: center;
    margin: 20px 0;
  }

  .search-input {
    width: 300px;
    padding: 10px;
    border: 2px solid #007bff;
    border-radius: 5px;
    font-size: 16px;
  }

  .search-button {
    padding: 10px 15px;
    margin-left: 5px;
    border: none;
    background: #007bff;
    color: #fff;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.3s;
  }

  .search-button:hover {
    background: #0056b3;
  }

  .blog-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 20px;
  }

  .blog-card {
    width: 150px;
    height: auto;
    background: #fff;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    border-radius: 10px;
    overflow: hidden;
    transition: transform 0.3s;
  }

  .blog-card:hover {
    transform: scale(1.05);
  }

  .img {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100px; /* Adjust height as needed */
    overflow: hidden;
  }

  .img img {
    max-width: 100%;
    max-height: 100%;
    object-fit: cover;
    display: block;
  }

  .contain {
    padding: 15px;
  }

  .contain span {
    font-size: 20px;
    font-weight: bold;
    color: #007bff;
  }

  .contain hr {
    border: 0;
    height: 1px;
    background: #ddd;
    margin: 10px 0;
  }

  .contain p {
    font-size: 14px;
    color: #555;
  }

  h2 {
    text-align: center;
    color: #555;
  }

  /* New section for long background */
  .long-background {
    height: 100vh; /* Full viewport height */
    background: linear-gradient(to bottom, #e3f2fd, #f8f9fa);
    position: relative;
    z-index: -1; /* Send it to the back */
  }

  .content-section {
    padding: 50px 20px;
    text-align: center;
  }

  body {
    background-color: #ffffff; /* White background */
    margin: 0;
    padding: 20px;
  }
  
  .image-container {
    display: flex;
    flex-direction: column; /* Stack images vertically */
    align-items: center; /* Center images */
    gap: 20px; /* Space between images */
  }
  
  .responsive-image {
    max-width: 100%; /* Responsive width */
    height: auto; /* Maintain aspect ratio */
    object-fit: cover; /* Cover the container */
  }
    /* Slider Container */
    .slider-container {
      width: 100%;
      height: auto;
      overflow: hidden;
      position: relative;
    }
  
    /* Individual Slide */
    .slide {
      display: none;
      width: 100%;
    }
  
    /* Active Slide */
    .active-slide {
      display: block;
    }
  
    /* Controls */
    .slider-controls {
      position: absolute;
      top: 50%;
      width: 100%;
      display: flex;
      justify-content: space-between;
      transform: translateY(-50%);
    }
  
    .control-btn {
      background-color: rgba(0, 0, 0, 0.5);
      border: none;
      color: #fff;
      padding: 10px;
      cursor: pointer;
    }
  
  




</style>


<div>
<form action="/search">
  <div class="search-container">
    <input type="text" class="search-input" placeholder="Search..." name="q">
    <button class="search-button">search</button>
  </div>
</form>
</div>

<div class="slider-container">
  <div class="slide active-slide"><img src="path/to/your/image1.jpg" alt="Image 1" class="responsive-image"></div>
  <div class="slide"><img src="path/to/your/image2.jpg" alt="Image 2" class="responsive-image"></div>
  <div class="slide"><img src="path/to/your/image3.jpg" alt="Image 3" class="responsive-image"></div>

  <div class="slider-controls">
    <button class="control-btn" onclick="prevSlide()">&#10094;</button>
    <button class="control-btn" onclick="nextSlide()">&#10095;</button>
  </div>
</div>

{% if blogs %}
<div class="blog-container">
  {% for blog in blogs %}
  <a href="blogs/{{blog.id}}">
    <div class="blog-card">
      <div class="img"><img src="{{ blog.blog_image.url }}" alt=""></div>        
      <div class="contain">
        <span>{{ blog.title }}</span>
        <hr> 
        <p>{{ blog.description }}</p>
        <p><strong>Author:</strong> {{ blog.user.first_name }} {{ blog.user.last_name }}</p>
      </div>
    </div>
  </a> 
  {% endfor %}
</div>
{% else %}
<h2>No Blogs Found!</h>
  {% endif %}



{%endblock%}
