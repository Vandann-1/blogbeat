{% extends 'custom.html' %}

{% block content %}
<br><br><br>
<style>
  /* Smooth gradient animated background */
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fbc2eb, #8ec5fc, #e0c3fc);
    background-size: 400% 400%;
    animation: gradientBG 10s infinite linear;
    color: #333;
    background-attachment: fixed;
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .search-container {
    display: flex;
    justify-content: center;
    margin: 20px 0;
  }

  .search-input {
    width: 300px;
    padding: 10px;
    border: 2px solid #36cef4;
    border-radius: 5px;
    font-size: 16px;
  }

  .search-button {
    padding: 10px 15px;
    margin-left: 5px;
    border: none;
    background: #36cef4;
    color: #fff;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .search-button:hover {
    background: #4eaef7;
    transform: scale(1.1);
  }

  /* Blog container with animated effects */
  .blog-container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    padding: 20px;
    justify-content: center;
  }

  /* Glassmorphism card effect */
  .blog-card {
    background: rgba(255, 255, 255, 0.2);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    border-radius: 15px;
    overflow: hidden;
    backdrop-filter: blur(10px);
    padding: 15px;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeInUp 0.8s forwards;
  }

  @keyframes fadeInUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .blog-card:hover {
    transform: scale(1.05);
    box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
  }

  .img {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 180px;
    overflow: hidden;
    border-radius: 10px;
  }

  .img img {
    max-width: 100%;
    max-height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
  }

  .img img:hover {
    transform: scale(1.1);
  }

  .contain {
    padding: 15px;
    text-align: center;
  }

  .contain span {
    font-size: 20px;
    font-weight: bold;
    color: #ff4a4a;
    display: block;
  }

  .contain p {
    font-size: 14px;
    color: #555;
    margin: 5px 0;
  }

  /* Responsive for smaller screens */
  @media (max-width: 768px) {
    .blog-container {
      grid-template-columns: 1fr;
    }
  }

</style>
<br>
<div>
  <form action="/search">
    <div class="search-container">
      <input type="text" class="search-input" placeholder="Search..." name="q">
      <button class="search-button">Search</button>
    </div>
  </form>
</div>

{% if blogs %}
<div class="blog-container">
  {% for blog in blogs %}
  <a href="blogs/{{ blog.id }}">
    <div class="blog-card">
      <div class="img"><img src="{{ blog.blog_image.url }}" alt=""></div>        
      <div class="contain">
        <span>{{ blog.title }}</span>
        <p>{{ blog.description }}</p>
        <p><strong>Author:</strong> {{ blog.user.first_name }} {{ blog.user.last_name }}</p>
      </div>
    </div>
  </a>
  {% endfor %}
</div>
{% else %}
<h2 style="text-align: center;">No Blogs Found!</h2>
{% endif %}

{% endblock %}
